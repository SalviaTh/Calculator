<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./output.css" rel="stylesheet">
</head>
<body class="flex justify-center items-center min-h-screen bg-gray-800 text-xl">
  <div class="bg-black min-h-96 w-80 h-110 rounded-lg sm:h-140 sm:w-100 flex-col justify-center items-center" >
    <input class="bg-black text-white font-bold text-6xl w-full h-1/4 rounded-lg p-3" readonly id="display">
    <div class="grid grid-cols-4 p-4 justify-center font-bold">
        <button class="text-white bg-gray-500 rounded-full m-1 p-3 sm:p-5 col-span-2 cursor-pointer" onclick="clearDisplay()">AC</button>
        <button class="text-white bg-gray-500 m-1 rounded-full p-3 sm:p-5" onclick="appendtoDisplay('%') ">%</button>
        <button class="text-white bg-orange-400 m-1 rounded-full p-3 sm:p-5" onclick="appendtoDisplay('/')">/</button>
        <button class="text-white bg-gray-500 m-1 rounded-full p-3 sm:p-5" onclick="appendtoDisplay('7')">7</button>
        <button class="text-white bg-gray-500 m-1 rounded-full p-3 sm:p-5" onclick="appendtoDisplay('8')">8</button>
        <button class="text-white bg-gray-500 m-1 rounded-full p-3 sm:p-5" onclick="appendtoDisplay('9')">9</button>
        <button class="text-white bg-orange-400 m-1 rounded-full p-3 sm:p-5" onclick="appendtoDisplay('x')">x</button>
        <button class="text-white bg-gray-500 m-1 rounded-full p-3 sm:p-5" onclick="appendtoDisplay('4')">4</button>
        <button class="text-white bg-gray-500 m-1 rounded-full p-3 sm:p-5" onclick="appendtoDisplay('5')">5</button>
        <button class="text-white bg-gray-500 m-1 rounded-full p-3 sm:p-5" onclick="appendtoDisplay('6')">6</button>
        <button class="text-white bg-orange-400 m-1 rounded-full p-3 sm:p-5" onclick="appendtoDisplay('-')">-</button>
        <button class="text-white bg-gray-500 m-1 rounded-full p-3 sm:p-5" onclick="appendtoDisplay('1')">1</button>
        <button class="text-white bg-gray-500 m-1 rounded-full p-3 sm:p-5" onclick="appendtoDisplay('2')">2</button>
        <button class="text-white bg-gray-500 m-1 rounded-full p-3 sm:p-5" onclick="appendtoDisplay('3')">3</button>
        <button class="text-white bg-orange-400 m-1 rounded-full p-3 sm:p-5" onclick="appendtoDisplay('+')">+</button>
        <button class="text-white bg-gray-500 m-1 rounded-full p-3 sm:p-5" onclick="appendtoDisplay('+')">0</button>
        <button class="text-white bg-gray-500 m-1 rounded-full p-3 sm:p-5" onclick="appendtoDisplay('+')">.</button>
        <button class="text-white bg-orange-400 m-1 rounded-full p-3 sm:p-5 col-span-2" onclick="Calculate() ">=</button>
    </div>
  </div>
  <script src="./script.js"></script>
</body>
</html>
